<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Japanese CD Shop</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <form
      action="https://animatebkk-online.com/product-category/cd"
      target="_blank"
      method="get"
    >
      <h1>ร้านขาย CD J-Pop 🎵</h1>

      <div>
        <img
          src="https://animatebkk-online.com/wp-content/uploads/2024/11/%E3%80%9011%E6%9C%8814%E6%97%A520%E6%99%8230%E5%88%86%E6%97%A5%E6%9C%AC%E6%99%82%E9%96%93-%E8%A7%A3%E7%A6%81%E3%80%91hos_AL_H1_tsujo_1111_0.jpg"
          alt="Hoshimachi Suisei"
        />
      </div>

      <p>
        <label for="artist">ค้นหาชื่อศิลปิน:</label>
        <input
          id="artist"
          type="text"
          placeholder="เช่น YOASOBI"
          name="artist_name"
        />
      </p>

      <div>
        <h3>💿 เลือกประเภทแผ่น</h3>
        <input type="radio" name="cd_type" id="single" value="Single" />
        <label for="single">Single</label>
        <input type="radio" name="cd_type" id="album" value="Album" />
        <label for="album">Full Album</label>
      </div>

      <div>
        <h3>🎁 ของแถมพิเศษ</h3>
        <label
          ><input type="checkbox" name="bonus" value="postcard" />
          โปสการ์ด</label
        >
        <label
          ><input type="checkbox" name="bonus" value="poster" /> โปสเตอร์</label
        >
        <label
          ><input type="checkbox" name="bonus" value="sticker" />
          สติ๊กเกอร์</label
        >
      </div>

      <button type="submit">สั่งซื้อทันที</button>
    </form>

    <hr />

    <form action="https://www.google.com/search" method="get" target="_blank">
      <h2>🔍 ค้นหาบน Google</h2>
      <input type="text" name="q" placeholder="พิมพ์ชื่อเพลง..." />

      <select name="genre_search">
        <option value="jpop">J-Pop</option>
        <option value="anisong">Anime Song</option>
      </select>

      <button type="submit">ค้นหา</button>
    </form>
  </body>
</html>
